<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Covetrus Presentation Builder</title>
<link rel="stylesheet" href="slide-styles.css"/>

<!-- React + Babel (vendored locally — no external dependencies) -->
<script src="vendor/react.production.min.js"></script>
<script src="vendor/react-dom.production.min.js"></script>
<script src="vendor/babel.min.js"></script>

<!-- Export libraries (vendored locally) -->
<script src="vendor/pptxgen.bundle.js"></script>
<script src="vendor/html-to-image.js"></script>

<style>
  :root {
    --ui-navy: #021660;
    --ui-teal: #27BDBE;
    --ui-ink: #1F2937;
    --ui-muted: #6B7280;
    --ui-line: #E5E7EB;
    --ui-bg: #EEF0F4;
    --ui-panel: #FFFFFF;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--ui-bg); font-family: 'Mulish', system-ui, -apple-system, sans-serif; color: var(--ui-ink); }
  #root { height: 100%; }
  .app { height: 100%; display: flex; flex-direction: column; }

  /* ---------- top bar ---------- */
  .topbar { height: 60px; flex: none; background: var(--ui-panel); border-bottom: 1px solid var(--ui-line); display: flex; align-items: center; gap: 16px; padding: 0 18px; z-index: 20; }
  .tb-logo { height: 22px; }
  .tb-div { width: 1px; height: 24px; background: var(--ui-line); }
  .tb-title { font-size: 15px; font-weight: 800; color: var(--ui-navy); border: 1px solid transparent; background: transparent; border-radius: 7px; padding: 7px 10px; width: 280px; font-family: inherit; }
  .tb-title:hover { border-color: var(--ui-line); }
  .tb-title:focus { outline: none; border-color: var(--ui-teal); background: #fff; }
  .tb-meta { font-size: 12.5px; color: var(--ui-muted); font-weight: 600; }
  .tb-actions { margin-left: auto; display: flex; align-items: center; gap: 10px; }

  .btn { font-family: inherit; font-weight: 800; font-size: 13.5px; border-radius: 8px; padding: 9px 16px; cursor: pointer; border: 1.5px solid transparent; transition: all .15s; }
  .btn.primary { background: var(--ui-teal); color: #fff; }
  .btn.primary:hover { filter: brightness(1.05); }
  .btn.ghost { background: #fff; color: var(--ui-navy); border-color: var(--ui-line); }
  .btn.ghost:hover { border-color: var(--ui-navy); }
  .btn.sm { padding: 7px 12px; font-size: 12.5px; }

  .menu { position: relative; }
  .menu-pop { position: absolute; right: 0; top: calc(100% + 6px); background: #fff; border: 1px solid var(--ui-line); border-radius: 10px; box-shadow: 0 12px 32px rgba(2,22,96,0.15); padding: 6px; min-width: 200px; display: none; flex-direction: column; z-index: 30; }
  .menu:hover .menu-pop { display: flex; }
  .menu-pop button { text-align: left; background: none; border: 0; font-family: inherit; font-size: 13.5px; font-weight: 700; color: var(--ui-ink); padding: 10px 12px; border-radius: 7px; cursor: pointer; }
  .menu-pop button:hover { background: var(--ui-bg); }

  /* ---------- main 3-col ---------- */
  .main { flex: 1; display: grid; grid-template-columns: 200px 1fr 320px; min-height: 0; }

  /* rail */
  .rail { background: var(--ui-panel); border-right: 1px solid var(--ui-line); display: flex; flex-direction: column; min-height: 0; }
  .add-slide { margin: 12px; padding: 11px; border: 1.5px dashed var(--ui-line); background: #fff; color: var(--ui-navy); border-radius: 9px; font-family: inherit; font-weight: 800; font-size: 13px; cursor: pointer; flex: none; transition: all .15s; }
  .add-slide:hover { border-color: var(--ui-teal); color: var(--ui-teal); }
  .rail-list { overflow-y: auto; padding: 0 12px 16px; display: flex; flex-direction: column; gap: 10px; }
  .rail-item { position: relative; display: grid; grid-template-columns: 22px 1fr; gap: 8px; align-items: center; cursor: pointer; padding: 6px; border-radius: 10px; border: 2px solid transparent; }
  .rail-item:hover { background: var(--ui-bg); }
  .rail-item.sel { border-color: var(--ui-teal); background: #fff; }
  .rail-num { font-size: 12px; font-weight: 800; color: var(--ui-muted); text-align: center; }
  .rail-thumb { border: 1px solid var(--ui-line); border-radius: 6px; overflow: hidden; background: #fff; }
  .rail-tools { position: absolute; right: 6px; top: 6px; display: none; gap: 2px; background: rgba(255,255,255,0.95); border: 1px solid var(--ui-line); border-radius: 7px; padding: 2px; box-shadow: 0 4px 12px rgba(2,22,96,0.12); }
  .rail-item:hover .rail-tools { display: flex; }
  .rail-tools button { width: 24px; height: 24px; border: 0; background: none; border-radius: 5px; cursor: pointer; font-size: 13px; color: var(--ui-ink); }
  .rail-tools button:hover:not(:disabled) { background: var(--ui-bg); }
  .rail-tools button:disabled { opacity: 0.3; cursor: default; }

  /* canvas */
  .canvas { position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; background:
    radial-gradient(circle at 1px 1px, rgba(2,22,96,0.06) 1px, transparent 0) 0 0 / 24px 24px, var(--ui-bg); }
  .stage { box-shadow: 0 16px 48px rgba(2,22,96,0.18); border-radius: 4px; overflow: hidden; background: #fff; }

  /* inspector */
  .panel { background: var(--ui-panel); border-left: 1px solid var(--ui-line); overflow-y: auto; }
  .insp { padding: 20px 18px 40px; }
  .insp-type { font-size: 12px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ui-teal); margin-bottom: 18px; }
  .field { display: block; margin-bottom: 16px; }
  .field-lbl { display: block; font-size: 12px; font-weight: 800; color: var(--ui-muted); margin-bottom: 7px; }
  .inp { width: 100%; font-family: inherit; font-size: 13.5px; padding: 9px 11px; border: 1px solid var(--ui-line); border-radius: 8px; color: var(--ui-ink); }
  .inp:focus { outline: none; border-color: var(--ui-teal); }
  .inp.xs { padding: 6px 8px; font-size: 12.5px; }
  .inp.num { -moz-appearance: textfield; }
  .seg { display: flex; gap: 4px; background: var(--ui-bg); padding: 4px; border-radius: 9px; }
  .seg button { flex: 1; border: 0; background: none; font-family: inherit; font-weight: 800; font-size: 12px; padding: 7px 6px; border-radius: 6px; cursor: pointer; color: var(--ui-muted); text-transform: capitalize; }
  .seg button.on { background: #fff; color: var(--ui-navy); box-shadow: 0 1px 3px rgba(2,22,96,0.12); }

  .sub-h { font-size: 12px; font-weight: 800; color: var(--ui-navy); margin: 18px 0 8px; }
  .rowlist { display: flex; flex-direction: column; gap: 7px; }
  .rl-item { display: flex; align-items: flex-start; gap: 6px; background: var(--ui-bg); border-radius: 8px; padding: 8px 8px 8px 10px; }
  .rl-body { flex: 1; min-width: 0; }
  .rl-name { font-size: 12.5px; font-weight: 700; color: var(--ui-ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
  .rl-del { width: 24px; height: 24px; flex: none; border: 0; background: none; color: var(--ui-muted); border-radius: 5px; cursor: pointer; font-size: 12px; }
  .rl-del:hover:not(:disabled) { background: #fff; color: var(--ui-navy); }
  .rl-del:disabled { opacity: 0.25; cursor: default; }
  .bar-edit { display: grid; grid-template-columns: 1fr 64px 64px; gap: 5px; }
  .hint-row, .insp-tip { font-size: 11.5px; color: var(--ui-muted); line-height: 1.5; }
  .hint-row { margin: 8px 0; }
  .insp-tip { margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--ui-line); }

  /* ---------- inline edit affordances (inside slides) ---------- */
  .ed { outline: none; cursor: text; border-radius: 3px; transition: box-shadow .12s; }
  .ed:hover { box-shadow: 0 0 0 2px rgba(39,189,190,0.25); }
  .ed:focus { box-shadow: 0 0 0 2px var(--ui-teal); background: rgba(39,189,190,0.06); }
  .ed:empty::before { content: attr(data-ph); color: rgba(120,120,120,0.5); }
  .pk { cursor: pointer; transition: box-shadow .12s; }
  .pk:hover { box-shadow: 0 0 0 3px rgba(39,189,190,0.45); }

  /* ---------- modals ---------- */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(2,22,96,0.35); display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(2px); }
  .modal { background: #fff; border-radius: 16px; box-shadow: 0 24px 64px rgba(2,22,96,0.3); width: 520px; max-width: 92vw; max-height: 88vh; display: flex; flex-direction: column; overflow: hidden; }
  .modal-wide { width: 860px; }
  .modal-hd { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; border-bottom: 1px solid var(--ui-line); }
  .modal-hd b { font-size: 16px; color: var(--ui-navy); }
  .icon-btn { border: 0; background: none; font-size: 16px; cursor: pointer; color: var(--ui-muted); width: 32px; height: 32px; border-radius: 8px; }
  .icon-btn:hover { background: var(--ui-bg); }
  .modal-body { padding: 20px 22px; overflow-y: auto; }
  .modal-foot { margin-top: 16px; display: flex; justify-content: flex-end; }
  .search { width: 100%; font-family: inherit; font-size: 14px; padding: 11px 14px; border: 1px solid var(--ui-line); border-radius: 10px; margin-bottom: 16px; }
  .search:focus { outline: none; border-color: var(--ui-teal); }

  .icon-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
  .icon-cell { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 14px 6px; border: 1px solid var(--ui-line); border-radius: 10px; background: #fff; cursor: pointer; transition: all .12s; }
  .icon-cell:hover { border-color: var(--ui-teal); box-shadow: 0 6px 16px rgba(2,22,96,0.1); }
  .icon-cell img { width: 30px; height: 30px; }
  .icon-cell span { font-size: 10.5px; font-weight: 700; color: var(--ui-muted); text-align: center; }
  .empty { grid-column: 1/-1; text-align: center; color: var(--ui-muted); padding: 30px; }

  .tabs { display: flex; gap: 6px; margin-bottom: 16px; }
  .tab { border: 0; background: var(--ui-bg); font-family: inherit; font-weight: 800; font-size: 13px; padding: 9px 16px; border-radius: 8px; cursor: pointer; color: var(--ui-muted); }
  .tab.on { background: var(--ui-navy); color: #fff; }
  .img-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .img-cell { display: flex; flex-direction: column; gap: 8px; border: 0; background: none; cursor: pointer; padding: 0; }
  .img-cell .swatch { width: 100%; aspect-ratio: 16/10; border-radius: 10px; border: 1px solid rgba(0,0,0,0.08); }
  .img-cell:hover .swatch { outline: 3px solid var(--ui-teal); outline-offset: 2px; }
  .img-cell span { font-size: 11.5px; font-weight: 700; color: var(--ui-muted); }
  .upload-zone { border: 2px dashed var(--ui-line); border-radius: 14px; padding: 44px; text-align: center; cursor: pointer; transition: all .15s; }
  .upload-zone:hover { border-color: var(--ui-teal); background: rgba(39,189,190,0.04); }
  .up-ic { font-size: 34px; color: var(--ui-teal); }
  .up-title { font-weight: 800; color: var(--ui-navy); margin-top: 10px; font-size: 15px; }
  .up-sub { font-size: 12.5px; color: var(--ui-muted); margin-top: 6px; }

  /* add gallery */
  .gal-group { margin-bottom: 22px; }
  .gal-h { font-size: 12px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ui-teal); margin-bottom: 10px; }
  .gal-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .gal-cell { text-align: left; border: 1px solid var(--ui-line); border-radius: 12px; background: #fff; cursor: pointer; overflow: hidden; padding: 0; transition: all .12s; }
  .gal-cell:hover { border-color: var(--ui-teal); box-shadow: 0 8px 20px rgba(2,22,96,0.12); transform: translateY(-2px); }
  .gal-thumb { border-bottom: 1px solid var(--ui-line); background: var(--ui-bg); display: flex; }
  .gal-name { font-size: 13.5px; font-weight: 800; color: var(--ui-navy); padding: 10px 12px 2px; }
  .gal-hint { font-size: 11.5px; color: var(--ui-muted); padding: 0 12px 12px; line-height: 1.4; }

  .mini { overflow: hidden; }

  /* present */
  .present { position: fixed; inset: 0; background: #000; z-index: 200; display: flex; align-items: center; justify-content: center; }
  .present-stage { overflow: hidden; }
  .present-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 14px; background: rgba(20,20,20,0.9); border: 1px solid rgba(255,255,255,0.12); border-radius: 999px; padding: 8px 16px; color: #fff; z-index: 210; }
  .present-bar button { background: none; border: 0; color: #fff; font-size: 18px; cursor: pointer; width: 32px; height: 32px; border-radius: 50%; }
  .present-bar button:hover:not(:disabled) { background: rgba(255,255,255,0.12); }
  .present-bar button:disabled { opacity: 0.3; cursor: default; }
  .present-bar span { font-size: 13px; font-weight: 700; min-width: 56px; text-align: center; }
  .present-x { font-size: 13px !important; font-weight: 800; width: auto !important; border-radius: 999px !important; padding: 0 12px; }
  .present-tap { position: fixed; top: 0; bottom: 0; width: 22%; cursor: pointer; z-index: 205; }
  .present-tap.left { left: 0; }
  .present-tap.right { right: 0; }

  /* toast + export overlay */
  .toast { position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%); background: var(--ui-navy); color: #fff; font-size: 13.5px; font-weight: 700; padding: 12px 22px; border-radius: 10px; box-shadow: 0 12px 32px rgba(2,22,96,0.3); z-index: 300; }
  .overlay-msg { position: fixed; inset: 0; background: rgba(2,22,96,0.45); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; color: #fff; font-size: 16px; font-weight: 800; z-index: 300; backdrop-filter: blur(3px); }
  .spinner { width: 44px; height: 44px; border: 4px solid rgba(255,255,255,0.25); border-top-color: var(--ui-teal); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* hidden export render */
  .print-root { position: fixed; left: -100000px; top: 0; }
  .print-slide { width: 1920px; height: 1080px; overflow: hidden; }

  @media print {
    @page { size: 1920px 1080px; margin: 0; }
    .app > *:not(.print-root) { display: none !important; }
    .print-root { position: static !important; left: 0 !important; }
    .print-slide { page-break-after: always; }
  }

  /* small screens warning */
  .too-small { display: none; }
  @media (max-width: 900px) {
    .main, .topbar { display: none; }
    .too-small { display: flex; align-items: center; justify-content: center; height: 100%; padding: 40px; text-align: center; font-weight: 700; color: var(--ui-navy); }
  }
</style>
</head>
<body>
<div id="root"></div>
<div class="too-small">The Presentation Builder is designed for a desktop screen. Please open it on a wider window.</div>

<script src="library.js"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="slides.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
